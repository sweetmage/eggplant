<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eggplant Image Gallery</title>
  <style>
    :root {
      --bg: #f4efe7;
      --panel: #fffaf2;
      --ink: #2a211a;
      --muted: #6b5a4d;
      --line: #d7c5b4;
      --accent: #b44f2b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
      color: var(--ink);
      background: linear-gradient(180deg, #f8f2ea 0%, #efe7dc 100%);
    }
    .wrap {
      max-width: 1440px;
      margin: 0 auto;
      padding: 28px 22px 40px;
    }
    .top {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px;
      align-items: end;
      margin-bottom: 20px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 36px;
    }
    .subtext {
      color: var(--muted);
      margin: 0;
    }
    input {
      min-width: 280px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 12px 14px;
      font: inherit;
      background: rgba(255,255,255,0.85);
    }
    .actions a {
      color: var(--accent);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255,255,255,0.7);
      padding: 12px;
    }
    .card img {
      width: 100%;
      height: 260px;
      object-fit: contain;
      background: rgba(0,0,0,0.04);
      border-radius: 14px;
      display: block;
    }
    .meta {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>Image Gallery</h1>
        <p class="subtext" id="gallerySummary"></p>
      </div>
      <div class="actions">
        <input id="gallerySearch" type="search" placeholder="Search image paths">
        <p class="subtext"><a href="./index.html">Back to scene browser</a></p>
      </div>
    </div>
    <div class="grid" id="galleryGrid"></div>
  </div>
  <script src="./data.js"></script>
  <script>
    const data = window.EGGPLANT_DATA;
    const images = data.images;
    const grid = document.getElementById("galleryGrid");
    const search = document.getElementById("gallerySearch");
    const summary = document.getElementById("gallerySummary");

    summary.textContent = `${images.length.toLocaleString()} copied images`;

    function render() {
      const query = search.value.trim().toLowerCase();
      const filtered = images.filter(item => !query || item.id.toLowerCase().includes(query) || item.relative_path.toLowerCase().includes(query));
      grid.innerHTML = "";
      for (const item of filtered) {
        const card = document.createElement("figure");
        card.className = "card";

        const img = document.createElement("img");
        img.loading = "lazy";
        img.src = item.export_path;
        img.alt = item.id;
        card.appendChild(img);

        const meta = document.createElement("figcaption");
        meta.className = "meta";
        meta.textContent = `${item.id} · ${item.human_size}`;
        card.appendChild(meta);

        grid.appendChild(card);
      }
      summary.textContent = `${filtered.length.toLocaleString()} of ${images.length.toLocaleString()} copied images`;
    }

    search.addEventListener("input", render);
    render();
  </script>
</body>
</html>
